<script>
/* ── Tab switching ── */
document.querySelectorAll('.cf-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cf-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.cf-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('formSuccess').style.display = 'none';
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

/* ── Form validation & submission ── */
function getI18n(id) {
  if (typeof I18N !== 'undefined' && I18N.zh && I18N.zh[id]) return I18N.zh[id];
  return null;
}

function showSuccess(panelId) {
  document.querySelectorAll('.cf-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('formSuccess').style.display = 'block';
}

function resetForms() {
  document.querySelectorAll('form').forEach(f => f.reset());
  document.querySelectorAll('.cf-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-contact').classList.add('active');
  document.querySelectorAll('.cf-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tabContact').classList.add('active');
  document.getElementById('formSuccess').style.display = 'none';
}

function validateForm(form) {
  let valid = true;
  form.querySelectorAll('[required]').forEach(field => {
    const err = field.parentElement.querySelector('.field-error');
    if (err) err.remove();
    field.style.borderColor = '';
    if (!field.value.trim()) {
      valid = false;
      field.style.borderColor = '#E85D00';
      const el = document.createElement('span');
      el.className = 'field-error';
      el.style.cssText = 'color:#E85D00;font-size:12px;display:block;margin-top:4px;';
      el.textContent = '此字段为必填项 / This field is required';
      field.parentElement.appendChild(el);
    } else if (field.type === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(field.value)) {
      valid = false;
      field.style.borderColor = '#E85D00';
      const el = document.createElement('span');
      el.className = 'field-error';
      el.style.cssText = 'color:#E85D00;font-size:12px;display:block;margin-top:4px;';
      el.textContent = '请输入有效的邮箱地址 / Please enter a valid email';
      field.parentElement.appendChild(el);
    }
  });
  return valid;
}

document.querySelectorAll('form').forEach(form => {
  form.addEventListener('submit', e => {
    e.preventDefault();
    if (!validateForm(form)) return;

    const btn = form.querySelector('[type=submit]');
    const btnText = btn.querySelector('.btn-text');
    const btnLoading = btn.querySelector('.btn-loading');
    btn.disabled = true;
    btnText.style.display = 'none';
    btnLoading.style.display = 'inline';

    // Simulate async submission
    setTimeout(() => {
      btn.disabled = false;
      btnText.style.display = 'inline';
      btnLoading.style.display = 'none';
      showSuccess();
    }, 1500);
  });
});
</script>
