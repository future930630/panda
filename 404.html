<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 页面未找到 — 熊猫手护</title>
  <meta name="description" content="抱歉，您访问的页面不存在。返回熊猫手护首页，或使用搜索功能查找您需要的内容。" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="styles.css?v=20260423" />
  <link rel="stylesheet" href="responsive.css?v=20260423" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23E85D00'/><text x='16' y='23' text-anchor='middle' font-family='Arial,sans-serif' font-size='22' font-weight='900' fill='white'>H</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Alibaba PuHuiTi 3.0', 'Alibaba PuHuiTi 2.0', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #1A1108;
      min-height: 100vh;
      color: #fff;
    }

    /* ── Header ── */
    .err-header {
      background: #E85D00;
      padding: 0 40px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }
    .err-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .err-logo-icon {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: #fff;
    }
    .err-logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .err-nav {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .err-nav a {
      padding: 8px 16px;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .err-nav a:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    /* ── Main content ── */
    .err-main {
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .err-main::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,93,0,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Big 404 */
    .err-code {
      font-size: 140px;
      font-weight: 900;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 3px rgba(232,93,0,0.4);
      letter-spacing: -8px;
      margin-bottom: 8px;
      position: relative;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .err-subcode {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* Content */
    .err-icon { font-size: 64px; margin-bottom: 20px; }
    .err-title {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }
    .err-desc {
      font-size: 16px;
      color: rgba(255,255,255,0.55);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* Search box */
    .err-search {
      display: flex;
      max-width: 480px;
      width: 100%;
      margin-bottom: 40px;
      gap: 0;
    }
    .err-search input {
      flex: 1;
      padding: 14px 18px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-right: none;
      border-radius: 10px 0 0 10px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .err-search input::placeholder { color: rgba(255,255,255,0.35); }
    .err-search input:focus {
      border-color: #E85D00;
      background: rgba(255,255,255,0.1);
    }
    .err-search button {
      padding: 14px 22px;
      background: #E85D00;
      color: #fff;
      border: none;
      border-radius: 0 10px 10px 0;
      font-size: 16px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .err-search button:hover { background: #C04800; }

    /* Action buttons */
    .err-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 56px;
    }
    .err-btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: #E85D00;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(232,93,0,0.35);
    }
    .err-btn-primary:hover {
      background: #C04800;
      transform: translateY(-1px);
    }
    .err-btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.12);
      transition: background 0.2s, border-color 0.2s;
    }
    .err-btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
    }

    /* Quick links */
    .err-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 600px;
    }
    .err-links-label {
      width: 100%;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .err-link-chip {
      padding: 7px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .err-link-chip:hover {
      background: rgba(232,93,0,0.2);
      border-color: rgba(232,93,0,0.4);
      color: #FF7A20;
    }

    /* Footer */
    .err-footer {
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .err-footer a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
    }
    .err-footer a:hover { color: rgba(255,255,255,0.7); }

    @media (max-width: 600px) {
      .err-header { padding: 0 20px; }
      .err-nav { display: none; }
      .err-code { font-size: 96px; letter-spacing: -4px; -webkit-text-stroke-width: 2px; }
      .err-title { font-size: 26px; }
      .err-search { flex-direction: column; }
      .err-search input, .err-search button {
        border-radius: 10px;
        border: 1.5px solid rgba(255,255,255,0.15);
      }
      .err-search input:focus { border-color: #E85D00; }
      .err-search button { justify-content: center; }
      .err-actions { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="err-header">
  <a href="index.html" class="err-logo">
    <div class="err-logo-icon">H</div>
    <span class="err-logo-text">熊猫手护</span>
  </a>
  <nav class="err-nav">
    <a href="products.html">产品</a>
    <a href="function-hub.html">功能</a>
    <a href="industry-hub.html">行业</a>
    <a href="equipment-hub.html">工厂</a>
    <a href="contact.html">联系</a>
  </nav>
</header>

<!-- Main -->
<main class="err-main">
  <div class="err-code">404</div>
  <div class="err-subcode">Page Not Found</div>

  <div class="err-icon">🔍</div>
  <h1 class="err-title">抱歉，页面不存在</h1>
  <p class="err-desc">您访问的页面可能已被移动、删除，或者地址输入有误。试试搜索，或返回首页浏览。</p>

  <!-- Search -->
  <div class="err-search">
    <input type="text" id="errSearchInput" placeholder="搜索产品、功能或行业..." onkeydown="if(event.key==='Enter')doErrSearch()" />
    <button onclick="doErrSearch()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      搜索
    </button>
  </div>

  <!-- Quick links -->
  <div class="err-links">
    <div class="err-links-label">快速访问</div>
    <a href="products.html" class="err-link-chip">产品中心</a>
    <a href="products-all.html" class="err-link-chip">全系产品</a>
    <a href="function-hub.html" class="err-link-chip">功能分类</a>
    <a href="industry-hub.html" class="err-link-chip">行业应用</a>
    <a href="sport-hub.html" class="err-link-chip">运动防护</a>
    <a href="contact.html" class="err-link-chip">联系我们</a>
    <a href="faq.html" class="err-link-chip">常见问题</a>
    <a href="equipment-hub.html" class="err-link-chip">生产工厂</a>
  </div>
</main>

<!-- Footer -->
<footer class="err-footer">
  &copy; 2026 Panda Guard (Beijing) Technology Co., Ltd. &nbsp;|&nbsp;
  <a href="index.html">返回首页</a> &nbsp;|&nbsp;
  <a href="contact.html">联系我们</a>
</footer>

<script>
function doErrSearch() {
  var q = document.getElementById('errSearchInput').value.trim();
  if (q) {
    window.location.href = 'search.html?q=' + encodeURIComponent(q);
  } else {
    window.location.href = 'search.html';
  }
}
</script>
</body>
</html>
