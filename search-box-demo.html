<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搜索框宽度扩展演示 - 熊猫手护</title>
  <link rel="stylesheet" href="styles.css?v=20260423">
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 40px 20px;
      font-family: 'Noto Sans SC', sans-serif;
    }
    
    .demo-container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      text-align: center;
      color: #999;
      margin-bottom: 40px;
      font-size: 14px;
    }
    
    .demo-box {
      background: #f9f9f9;
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 30px;
      transition: all 0.3s ease;
    }
    
    .demo-box:hover {
      border-color: #E85D00;
      background: #fffaf5;
    }
    
    .demo-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 15px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .hsc-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      width: auto;
      max-width: 700px;
      background: #F5F5F5;
      border: 1.5px solid #E8E8E8;
      border-radius: 24px;
      padding: 6px 16px;
      transition: max-width 0.3s ease, border-color 0.2s, box-shadow 0.2s, background 0.2s;
      height: 32px;
    }
    
    .hsc-inner:focus-within {
      border-color: var(--orange);
      background: #fff;
      box-shadow: 0 2px 16px rgba(232,93,0,0.12);
    }
    
    .hsc-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: var(--text);
      min-width: 0;
      order: 1;
    }
    
    .hsc-input::placeholder { 
      color: #bbb; 
    }
    
    .hsc-search-icon {
      flex-shrink: 0;
      color: #999;
      transition: color 0.2s;
      order: 10;
    }
    
    .hsc-inner:focus-within .hsc-search-icon {
      color: var(--orange);
    }
    
    .hsc-clear {
      display: flex;
      align-items: center;
      border: none;
      background: transparent;
      color: #bbb;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
      order: 9;
    }
    
    .hsc-clear:hover { 
      color: var(--text); 
    }
    
    .info-box {
      background: #e3f2fd;
      border-left: 4px solid #2196F3;
      padding: 15px;
      margin-top: 20px;
      border-radius: 4px;
      font-size: 13px;
      color: #1565c0;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 30px;
    }
    
    .stat-item {
      text-align: center;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
    }
    
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #E85D00;
    }
    
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }
    
    .code-block {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 15px;
      margin-top: 15px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      overflow-x: auto;
      color: #333;
    }
  </style>
  <link rel="stylesheet" href="responsive.css?v=1">
</head>
<body>

<div class="demo-container">
  <h1>🔍 搜索框宽度扩展演示</h1>
  <p class="subtitle">输入文字查看搜索框如何动态扩展</p>
  
  <div class="demo-box">
    <div class="demo-label">基础搜索框 - 支持动态宽度扩展</div>
    <div class="hsc-inner" id="demoInner">
      <svg class="hsc-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="M21 21l-4.35-4.35" stroke-linecap="round"></path>
      </svg>
      <input type="text" class="hsc-input" id="demoInput" placeholder="在这里输入...支持中文和English..." autocomplete="off"/>
      <button class="hsc-clear" id="demoClear" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    
    <div class="info-box">
      <strong>💡 使用说明：</strong> 在搜索框中输入文字，观察搜索框如何从700px平滑扩展到1400px。清空文字时会缩回原始大小。按 Esc 键快速清空。
    </div>
  </div>
  
  <div class="stats">
    <div class="stat-item">
      <div class="stat-value" id="charCount">0</div>
      <div class="stat-label">当前字数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="currentWidth">700</div>
      <div class="stat-label">当前宽度 (px)</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="expandPercent">0%</div>
      <div class="stat-label">扩展百分比</div>
    </div>
  </div>
  
  <div class="code-block">
配置参数：
• 最小宽度 (MIN_WIDTH): 700px
• 最大宽度 (MAX_WIDTH): 1400px  
• 达到最大宽度的字符数: 20
• 过渡动画时间: 0.3s ease
  </div>
</div>

<script>
  const demoInput = document.getElementById('demoInput');
  const demoClear = document.getElementById('demoClear');
  const demoInner = document.getElementById('demoInner');
  
  const MIN_WIDTH = 700;
  const MAX_WIDTH = 1400;
  const CHARS_TO_MAX = 20;
  
  // 更新宽度函数
  const updateWidth = () => {
    const textLength = demoInput.value.length;
    const newMaxWidth = Math.min(
      MIN_WIDTH + (textLength * (MAX_WIDTH - MIN_WIDTH) / CHARS_TO_MAX),
      MAX_WIDTH
    );
    
    demoInner.style.maxWidth = newMaxWidth + 'px';
    
    // 更新统计信息
    document.getElementById('charCount').textContent = textLength;
    document.getElementById('currentWidth').textContent = Math.round(newMaxWidth);
    document.getElementById('expandPercent').textContent = Math.round(
      ((newMaxWidth - MIN_WIDTH) / (MAX_WIDTH - MIN_WIDTH)) * 100
    ) + '%';
    
    console.log(`📝 输入: ${textLength}字 | 宽度: ${newMaxWidth.toFixed(0)}px | 扩展: ${Math.round(((newMaxWidth - MIN_WIDTH) / (MAX_WIDTH - MIN_WIDTH)) * 100)}%`);
  };
  
  // 重置宽度
  const resetWidth = () => {
    demoInner.style.maxWidth = MIN_WIDTH + 'px';
    document.getElementById('currentWidth').textContent = MIN_WIDTH;
    document.getElementById('expandPercent').textContent = '0%';
  };
  
  // 输入事件
  demoInput.addEventListener('input', () => {
    const hasText = demoInput.value.length > 0;
    demoClear.style.display = hasText ? 'flex' : 'none';
    updateWidth();
  });
  
  // 清空按钮
  demoClear.addEventListener('click', () => {
    demoInput.value = '';
    demoClear.style.display = 'none';
    resetWidth();
    demoInput.focus();
  });
  
  // Escape键
  demoInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      demoInput.value = '';
      demoClear.style.display = 'none';
      resetWidth();
      demoInput.blur();
    }
  });
  
  console.log('✅ 搜索框演示已加载');
  console.log('配置: MIN=' + MIN_WIDTH + 'px, MAX=' + MAX_WIDTH + 'px, CHARS_TO_MAX=' + CHARS_TO_MAX);
</script>

</body>
</html>
