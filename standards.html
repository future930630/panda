    }

      display: flex;

    }

      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 2px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      background: #fff;
    }
    .std-l1-header .std-toggle::after {
      content: '+';
      font-size: 16px;
      font-weight: 700;
      color: #ccc;
      line-height: 1;
    }
    .std-l1.expanded .std-toggle {
      background: #E85D00;
      border-color: #E85D00;
    }
    .std-l1.expanded .std-toggle::after {
      content: '−';
      color: #fff;
    }
    .std-l1-header input[type="checkbox"] {
      display: none;
    }
    .std-l1 .std-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 2px solid #ccc;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .std-l1 .std-checkbox.checked {
      background: #E85D00;
      border-color: #E85D00;
    }
    .std-l1 .std-checkbox.checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

      font-size: 1.1rem;
      font-weight: 700;
      color: #1A1108;

          { id: 'jp-4', title: 'JIS T 8112:2014', children: [] },
          {
            id: 'jp-5',
            title: '相关测试标准',
            children: [
              { id: 'jp-5-1', title: 'JIS L 1096' },
              { id: 'jp-5-2', title: 'JIS K 6328' }
            ]
          }
        ]
      }
    ];

    // 已选中的标准
    const selected = new Set();

    // 渲染树
    function renderTree() {
      const container = document.getElementById('stdTree');
      container.innerHTML = '';

      STANDARDS_DATA.forEach(l1 => {
        const l1El = document.createElement('div');
        l1El.className = 'std-l1';
        l1El.dataset.id = l1.id;

        l1El.innerHTML = `
          <div class="std-l1-header">
            <div class="std-toggle"></div>
            <div class="std-checkbox" data-id="${l1.id}"></div>
            <span class="std-l1-title">${l1.title}</span>
            <span class="std-l1-meta">${l1.meta}</span>
          </div>
          <div class="std-l2-list"></div>
        `;

        const l2List = l1El.querySelector('.std-l2-list');

        l1.children.forEach(l2 => {
          const l2El = document.createElement('div');
          l2El.className = 'std-l2';
          l2El.dataset.id = l2.id;
          const hasChildren = l2.children && l2.children.length > 0;

          let l3Html = '';
          if (hasChildren) {
            l3Html = `<div class="std-l3">
              <div class="std-l3-grid">
                ${l2.children.map(l3 => `
                  <div class="std-l3-item" data-id="${l3.id}">
                    <div class="std-checkbox"></div>
                    <span>${l3.title}</span>
                  </div>
                `).join('')}
              </div>
            </div>`;
          }

          l2El.innerHTML = `
            <div class="std-l2-header">
              ${hasChildren ? '<div class="std-toggle"></div>' : '<div style="width:20px"></div>'}
              <div class="std-checkbox" data-id="${l2.id}"></div>
              <span class="std-l2-title">${l2.title}</span>
            </div>
            ${l3Html}
          `;

          l2List.appendChild(l2El);
        });

        container.appendChild(l1El);
      });

      bindEvents();
      updateAllCheckboxes();
    }

    // 绑定事件
    function bindEvents() {
      // 一级展开/收起
      document.querySelectorAll('.std-l1-header').forEach(header => {
        header.addEventListener('click', function(e) {
          if (e.target.classList.contains('std-checkbox')) return;
          const l1 = this.closest('.std-l1');
          l1.classList.toggle('expanded');
        });
      });

      // 二级展开/收起
      document.querySelectorAll('.std-l2-header').forEach(header => {
        header.addEventListener('click', function(e) {
          if (e.target.classList.contains('std-checkbox')) return;
          const l2 = this.closest('.std-l2');
          if (l2.querySelector('.std-l3')) {
            l2.classList.toggle('expanded');
          }
        });
      });

      // 一级复选框
      document.querySelectorAll('.std-l1 .std-checkbox').forEach(cb => {
        cb.addEventListener('click', function(e) {
          e.stopPropagation();
          const l1 = this.closest('.std-l1');
          const id = this.dataset.id;
          const isChecked = this.classList.toggle('checked');

          // 选中/取消该一级下所有二级和三级的勾选
          if (isChecked) {
            selected.add(id);
            l1.querySelectorAll('.std-l2 .std-checkbox').forEach(cb2 => {
              selected.add(cb2.dataset.id);
              cb2.classList.add('checked');
            });
            l1.querySelectorAll('.std-l3-item').forEach(item => {
              selected.add(item.dataset.id);
              item.classList.add('checked');
            });
          } else {
            selected.delete(id);
            l1.querySelectorAll('.std-l2 .std-checkbox').forEach(cb2 => {
              selected.delete(cb2.dataset.id);
              cb2.classList.remove('checked');
            });
            l1.querySelectorAll('.std-l3-item').forEach(item => {
              selected.delete(item.dataset.id);
              item.classList.remove('checked');
            });
          }

          updateSummary();
        });
      });

      // 二级复选框
      document.querySelectorAll('.std-l2 .std-checkbox').forEach(cb => {
        cb.addEventListener('click', function(e) {
          e.stopPropagation();
          const l2 = this.closest('.std-l2');
          const l1 = l2.closest('.std-l1');
          const id = this.dataset.id;
          const isChecked = this.classList.toggle('checked');

          if (isChecked) {
            selected.add(id);
            // 同时选中其三级
            l2.querySelectorAll('.std-l3-item').forEach(item => {
              selected.add(item.dataset.id);
              item.classList.add('checked');
            });
          } else {
            selected.delete(id);
            l2.querySelectorAll('.std-l3-item').forEach(item => {
              selected.delete(item.dataset.id);
              item.classList.remove('checked');
            });
          }

          updateL1Checkbox(l1);
          updateSummary();
        });
      });

      // 三级复选框
      document.querySelectorAll('.std-l3-item').forEach(item => {
        item.addEventListener('click', function() {
          const id = this.dataset.id;
          const cb = this.querySelector('.std-checkbox');
          const isChecked = this.classList.toggle('checked');
          cb.classList.toggle('checked');

          if (isChecked) {
            selected.add(id);
          } else {
            selected.delete(id);
          }

          // 更新父级复选框状态
          const l2 = this.closest('.std-l2');
          const l1 = l2.closest('.std-l1');
          updateL2Checkbox(l2);
          updateL1Checkbox(l1);
          updateSummary();
        });
      });

      // 展开/收起全部
      document.getElementById('expandAll').addEventListener('click', function() {
        document.querySelectorAll('.std-l1').forEach(l1 => l1.classList.add('expanded'));
        document.querySelectorAll('.std-l2').forEach(l2 => l2.classList.add('expanded'));
      });

      document.getElementById('collapseAll').addEventListener('click', function() {
        document.querySelectorAll('.std-l1').forEach(l1 => l1.classList.remove('expanded'));
        document.querySelectorAll('.std-l2').forEach(l2 => l2.classList.remove('expanded'));
      });

      document.getElementById('clearAll').addEventListener('click', function() {
        selected.clear();
        document.querySelectorAll('.std-checkbox.checked').forEach(cb => cb.classList.remove('checked'));
        document.querySelectorAll('.std-l3-item.checked').forEach(item => item.classList.remove('checked'));
        updateSummary();
      });
    }

    // 更新一级复选框状态
    function updateL1Checkbox(l1) {
      const l2Checkboxes = l1.querySelectorAll('.std-l2 .std-checkbox');
      const checkedCount = Array.from(l2Checkboxes).filter(cb => cb.classList.contains('checked')).length;
      const l1Cb = l1.querySelector('.std-l1 .std-checkbox');

      if (checkedCount === l2Checkboxes.length && l2Checkboxes.length > 0) {
        l1Cb.classList.add('checked');
        selected.add(l1.dataset.id);
      } else {
        l1Cb.classList.remove('checked');
        selected.delete(l1.dataset.id);
      }
    }

    // 更新二级复选框状态
    function updateL2Checkbox(l2) {
      const l3Items = l2.querySelectorAll('.std-l3-item');
      if (l3Items.length === 0) return;

      const checkedCount = Array.from(l3Items).filter(item => item.classList.contains('checked')).length;
      const l2Cb = l2.querySelector('.std-checkbox');

      if (checkedCount === l3Items.length) {
        l2Cb.classList.add('checked');
        selected.add(l2.dataset.id);
      } else if (checkedCount > 0) {
        l2Cb.classList.remove('checked');
        selected.delete(l2.dataset.id);
      } else {
        l2Cb.classList.remove('checked');
        selected.delete(l2.dataset.id);
      }
    }

    // 更新所有复选框状态
    function updateAllCheckboxes() {
      document.querySelectorAll('.std-l1').forEach(l1 => {
        updateL1Checkbox(l1);
      });
    }

    // 更新摘要
    function updateSummary() {
      const container = document.getElementById('stdSummaryTags');

      if (selected.size === 0) {
        container.innerHTML = `<span class="std-summary-empty" data-i18n="standards.noSelect">请勾选需要的标准</span>`;
        return;
      }

      const tags = [];
      selected.forEach(id => {
        // 找到对应的标题
        for (const l1 of STANDARDS_DATA) {
          if (l1.id === id) {
            tags.push({ id, title: l1.title });
            break;
          }
          for (const l2 of l1.children) {
            if (l2.id === id) {
              tags.push({ id, title: `${l1.title} › ${l2.title}` });
              break;
            }
            if (l2.children) {
              for (const l3 of l2.children) {
                if (l3.id === id) {
                  tags.push({ id, title: l3.title });
                  break;
                }
              }
            }
          }
        }
      });

      container.innerHTML = tags.map(tag => `
        <span class="std-summary-tag" data-id="${tag.id}">
          ${tag.title}
          <span class="remove" onclick="removeSelection('${tag.id}')">✕</span>
        </span>
      `).join('');
    }

    // 移除单个选择
    window.removeSelection = function(id) {
      selected.delete(id);
      document.querySelector(`.std-checkbox[data-id="${id}"]`)?.classList.remove('checked');
      document.querySelector(`.std-l3-item[data-id="${id}"]`)?.classList.remove('checked');
      document.querySelector(`.std-l3-item[data-id="${id}"] .std-checkbox`)?.classList.remove('checked');

      // 更新父级
      for (const l1 of STANDARDS_DATA) {
        if (l1.id === id) {
          const l1El = document.querySelector(`.std-l1[data-id="${id}"]`);
          l1El.querySelectorAll('.std-checkbox.checked').forEach(cb => cb.classList.remove('checked'));
          l1El.querySelectorAll('.std-l3-item.checked').forEach(item => item.classList.remove('checked'));
          l1El.querySelectorAll('.std-l3-item .std-checkbox.checked').forEach(cb => cb.classList.remove('checked'));
          break;
        }
      }

      updateSummary();
    };

    // 初始化
    renderTree();

    // 导航初始化
    if (window.__pandaInitNav) window.__pandaInitNav();
  });
  </script>
</body>
</html>
